name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 16
        run: sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_16*.app' -print | sort -V | tail -n 1)"
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

      # The UIKit render branch has no test host, but it must always COMPILE
      # — Quoin shipped an iOS-only build break (an AppKit-only .toolTip)
      # precisely because nothing exercised this branch.
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          # Log to a file so compile DIAGNOSTICS survive failure — a bare
          # `tail` once ate the error text and left only the failed commands.
          if ! xcodebuild -scheme VinculumRender \
            -destination 'generic/platform=iOS Simulator' build > ios-build.log 2>&1; then
            grep -E "error:" ios-build.log | sort -u | head -40
            tail -20 ios-build.log
            exit 1
          fi
          tail -5 ios-build.log
