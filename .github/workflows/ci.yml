name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # VinculumLayout is platform-free (Foundation only) — this proves it builds
  # and its geometry tests pass headless on Linux, with no CoreText/AppKit.
  # VinculumRender's sources are AppKit/UIKit-guarded, so they compile to an
  # empty module here.
  linux:
    name: VinculumLayout (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (parser, macros, headless layout)
        run: swift test

  test:
    name: swift test (macOS)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 16
        run: sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_16*.app' -print | sort -V | tail -n 1)"
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

      # The UIKit render branch has no test host, but it must always COMPILE
      # — Quoin shipped an iOS-only build break (an AppKit-only .toolTip)
      # precisely because nothing exercised this branch.
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          # Log to a file so compile DIAGNOSTICS survive failure — a bare
          # `tail` once ate the error text and left only the failed commands.
          if ! xcodebuild -scheme VinculumRender \
            -destination 'generic/platform=iOS Simulator' build > ios-build.log 2>&1; then
            grep -E "error:" ios-build.log | sort -u | head -40
            tail -20 ios-build.log
            exit 1
          fi
          tail -5 ios-build.log

      # Regenerate the example images (labeled gallery posters + the stress
      # corpus pages) so docs/website always show the CURRENT rendering. Only
      # on main pushes; advisory (never blocks). Published below to a branch.
      - name: Generate gallery images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          mkdir -p /tmp/vinc-gallery
          VINCULUM_GALLERY_DIR=/tmp/vinc-gallery \
            swift test --filter GalleryGenerator/testGenerateGallery || true
          VINCULUM_STRESS_DIR=/tmp/vinc-gallery \
            swift test --filter MathStressGallery/testGenerateStressPages || true
          # Comprehensive command charts: every symbol by atom class + structural examples.
          VINCULUM_GALLERY_DIR=/tmp/vinc-gallery \
            swift test --filter CommandGalleryGenerator/testGenerateCommandGallery || true
          # Font showcase: the same equations in every bundled math font.
          VINCULUM_GALLERY_DIR=/tmp/vinc-gallery \
            swift test --filter FontShowcaseGenerator/testGenerateFontShowcase || true
          ls -la /tmp/vinc-gallery || true

      - name: Upload gallery
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: gallery
          path: /tmp/vinc-gallery/*.png
          if-no-files-found: ignore

  # Publish the regenerated example images to the `gallery` branch (force-push,
  # loop-free: `gallery` isn't in the push trigger). Docs/website reference them
  # by raw URL, e.g.
  #   https://raw.githubusercontent.com/clintecker/Vinculum/gallery/01-core.png
  publish-gallery:
    name: publish gallery branch
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Download gallery
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gallery
          path: /tmp/vinc-gallery
      - name: Publish gallery branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! ls /tmp/vinc-gallery/*.png >/dev/null 2>&1; then
            echo "no gallery images to publish"; exit 0
          fi
          dir=$(mktemp -d); cd "$dir"
          git init -q -b gallery
          cp /tmp/vinc-gallery/*.png .
          {
            echo "# Vinculum gallery"
            echo
            echo "Auto-generated from \`$GITHUB_SHA\` — do not edit; this branch is force-pushed by CI."
            echo
            for f in $(ls *.png | sort); do echo "### $f"; echo; echo "![$f]($f)"; echo; done
          } > README.md
          git add .
          git -c user.name="vinculum-ci" -c user.email="ci@vinculum.invalid" \
            commit -q -m "Gallery from $GITHUB_SHA"
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gallery
